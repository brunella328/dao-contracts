specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: TaskMarket
    network: qan-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"  # fill after deploy
      abi: TaskMarket
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Task
        - DailyStats
      abis:
        - name: TaskMarket
          file: ../artifacts/contracts/market/TaskMarket.sol/TaskMarket.json
      eventHandlers:
        - event: TaskPosted(indexed uint256,indexed address,uint256,string)
          handler: handleTaskPosted
        - event: TaskAccepted(indexed uint256,indexed address)
          handler: handleTaskAccepted
        - event: TaskSubmitted(indexed uint256,indexed address,string)
          handler: handleTaskSubmitted
        - event: TaskVerified(indexed uint256,indexed address,uint256)
          handler: handleTaskVerified
        - event: TaskDisputed(indexed uint256)
          handler: handleTaskDisputed
        - event: TaskSettled(indexed uint256,bool)
          handler: handleTaskSettled
        - event: TaskCancelled(indexed uint256)
          handler: handleTaskCancelled
      file: ./src/taskMarket.ts

  - kind: ethereum
    name: DIDRegistry
    network: qan-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: DIDRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - DIDRecord
      abis:
        - name: DIDRegistry
          file: ../artifacts/contracts/identity/DIDRegistry.sol/DIDRegistry.json
      eventHandlers:
        - event: DIDRegistered(indexed address,uint256,uint256)
          handler: handleDIDRegistered
        - event: DIDRevoked(indexed address,uint256)
          handler: handleDIDRevoked
        - event: CreditUpdated(indexed address,int256,uint256)
          handler: handleCreditUpdated
      file: ./src/didRegistry.ts

  - kind: ethereum
    name: AuditVoting
    network: qan-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: AuditVoting
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AuditSession
        - AuditVote
      abis:
        - name: AuditVoting
          file: ../artifacts/contracts/verification/AuditVoting.sol/AuditVoting.json
      eventHandlers:
        - event: AuditStarted(indexed uint256,address[5])
          handler: handleAuditStarted
        - event: VoteCast(indexed uint256,indexed address,bool)
          handler: handleVoteCast
        - event: AuditFinalized(indexed uint256,bool,uint256)
          handler: handleAuditFinalized
      file: ./src/auditVoting.ts

  - kind: ethereum
    name: OptimisticChallenge
    network: qan-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: OptimisticChallenge
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Challenge
      abis:
        - name: OptimisticChallenge
          file: ../artifacts/contracts/verification/OptimisticChallenge.sol/OptimisticChallenge.json
      eventHandlers:
        - event: ChallengeOpened(indexed uint256,indexed uint256,address)
          handler: handleChallengeOpened
        - event: ChallengeResolved(indexed uint256,bool,address)
          handler: handleChallengeResolved
      file: ./src/optimisticChallenge.ts

  - kind: ethereum
    name: GenesisLobster
    network: qan-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GenesisLobster
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LobsterMint
      abis:
        - name: GenesisLobster
          file: ../artifacts/contracts/identity/GenesisLobster.sol/GenesisLobster.json
      eventHandlers:
        - event: LobsterMinted(indexed address,indexed uint256,indexed uint256)
          handler: handleLobsterMinted
      file: ./src/genesisLobster.ts
